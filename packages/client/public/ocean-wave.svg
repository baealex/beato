<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Ocean Wave</title>
  <desc id="desc">A simple Ocean Wave symbol: an O ring with a calm wave inside.</desc>
  <defs>
    <linearGradient id="bg" x1="104" y1="64" x2="408" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b3440"/>
      <stop offset="1" stop-color="#031014"/>
    </linearGradient>
    <linearGradient id="ring" x1="132" y1="112" x2="380" y2="408" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eafffb"/>
      <stop offset="0.45" stop-color="#8ff7ed"/>
      <stop offset="1" stop-color="#2eb8bd"/>
    </linearGradient>
    <linearGradient id="wave" x1="136" y1="266" x2="376" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a7fff6"/>
      <stop offset="1" stop-color="#46d7cf"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
