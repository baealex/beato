<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Ocean Wave</title>
  <desc id="desc">A minimal black Ocean Wave app mark with one violet wave signal.</desc>
  <defs>
    <clipPath id="app-mask">
      <rect width="512" height="512" rx="112" />
    </clipPath>
    <linearGradient id="surface" x1="96" y1="48" x2="416" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#18181B" />
      <stop offset="1" stop-color="#09090B" />
    </linearGradient>
    <linearGradient id="edge" x1="116" y1="88" x2="396" y2="424" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3F3F46" />
      <stop offset="1" stop-color="#18181B" />
    </linearGradient>
    <linearGradient id="primary" x1="128" y1="286" x2="384" y2="226" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED" />
      <stop offset="1" stop-color="#A78BFA" />
    </linearGradient>
  </defs>

  <g clip-path="url(#app-mask)">
    <rect width="512" height="512" fill="url(#surface)" />
    <path d="M0 352c68-40 130-54 196-41 82 16 132 62 220 38 36-10 68-29 96-57v220H0Z" fill="#18181B" opacity="0.72" />
  </g>

  <circle cx="256" cy="256" r="158" fill="none" stroke="url(#edge)" stroke-width="28" />
  <circle cx="256" cy="256" r="110" fill="none" stroke="#27272A" stroke-width="2" opacity="0.9" />

  <path
    d="M126 278c36-42 78-58 126-49 34 6 55 27 86 27 24 0 42-11 58-30"
    fill="none"
    stroke="url(#primary)"
    stroke-width="34"
    stroke-linecap="round"
    stroke-linejoin="round" />

  <path
    d="M158 321c30-18 59-23 91-14 31 9 50 26 83 18 14-3 27-10 40-20"
    fill="none"
    stroke="#8B5CF6"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.62" />

  <circle cx="256" cy="256" r="176" fill="none" stroke="#F4F4F5" stroke-opacity="0.08" stroke-width="2" />
  <rect x="14" y="14" width="484" height="484" rx="98" fill="none" stroke="#F4F4F5" stroke-opacity="0.08" stroke-width="2" />
</svg>
