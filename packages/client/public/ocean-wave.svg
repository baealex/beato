  <path
    d="M132 270c34-34 72-48 114-42 29 4 47 17 68 26 22 10 43 9 66-8-12 36-43 58-82 58-27 0-46-10-67-19-30-13-60-17-99-15Z"
    fill="url(#wave)"/>

  <path
    d="M143 302c30-17 62-23 96-14 26 7 45 21 73 20 22-1 40-9 58-24-18 43-56 66-105 62-41-3-72-26-122-44Z"
    fill="#eafffb"
    opacity="0.82"/>

  <rect x="14" y="14" width="484" height="484" rx="98" fill="none" stroke="#c4f4f8" stroke-opacity="0.1" stroke-width="2"/>
