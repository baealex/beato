    d="M256 96c-88.37 0-160 71.63-160 160s71.63 160 160 160 160-71.63 160-160S344.37 96 256 96Zm0 66c51.91 0 94 42.09 94 94s-42.09 94-94 94-94-42.09-94-94 42.09-94 94-94Z"
    fill="url(#ring)"
