name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'server/src/**'
      - 'server/Dockerfile'
      - 'README.md'
      - '.dockerignore'
      - '.nvmrc'
      - 'biome.json'
      - 'docker-compose.yml'
      - 'lefthook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/**'
      - 'tests/branding/**'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
    paths:
      - 'server/src/**'
      - 'server/Dockerfile'
      - 'README.md'
      - '.dockerignore'
      - '.nvmrc'
      - 'biome.json'
      - 'docker-compose.yml'
      - 'lefthook.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'scripts/**'
      - 'tests/branding/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build:
    name: build (21.x)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.25.0

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Install
      run: pnpm install --frozen-lockfile

    - name: Test (Repository Metadata)
      run: pnpm test:metadata

    - name: Test (Server)
      run: pnpm test:server

    - name: Test (Client)
      run: pnpm test:client

    - name: Check
      run: pnpm check
